<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="Contact.css">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>






    <div class="contactbox">
        <form action="Contact.html">


          <label for="firstname">First Name</label>

          <input type="textsub" id="firstname" name="firstname" placeholder="Your name..">
      

          <label for="lastname">Last Name</label>

          <input type="textsub" id="lastname" name="lastname" placeholder="Your last name..">


          <label for="email">Email</label>

          <input type="textsub" id="email" name="email" placeholder="Your Email.." required="40">
      
          <label for="reason">Reason For Contact</label>
          <select id="reason" name="reason">
            <option value="TOS">TOS</option>
            <option value="Account">Account</option>
            <option value="Purchases">Purchases</option>
            <option value="other">Other</option>
          </select>
      
          <label for="subject">Subject</label>
          <textarea id="subject" name="subject" placeholder="Write something.." style="height:200px"></textarea>
      
          <input type="submit" value="Submit">
        </form>
      </div>


</body>
</html>
